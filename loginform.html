<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login form</title>
    <style>
        body {
            display: grid;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        input {

            display: block;
            margin: 10px 0;
        }
    </style>
</head>

<body>
    <form>
        <input type="text" placeholder="username">
        <input type="password" placeholder="password">
        <button>Login</button>
    </form>

</body>

</html>
