<!DOCTYPE html>
<html>

<head>
    <title>Pricing</title>

    <link href="css/bootstrap.min.css" rel="stylesheet">
    <script src="js/bootstrap.min.js"></script>
    <style>
        .price {
            font-size: 50px;
            font-weight: bold;
        }

        .price span {
            font-size: 30px;
            color: gray;
        }
    </style>
</head>

<body>

    <div class="container text-center py-5">
        <h1>Pricing</h1>
        <p class="text-secondary">Quickly build an effective pricing table.</p>

        <div class="row">

            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Free</div>
                    <div class="card-body">
                        <h1 class="price">$0<span>/mo</span></h1>
                        <p>10 users included<br>2 GB storage<br>Email support</p>
                        <button class="btn btn-outline-primary w-100">Sign up</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Pro</div>
                    <div class="card-body">
                        <h1 class="price">$15<span>/mo</span></h1>
                        <p>20 users included<br>10 GB storage<br>Priority support</p>
                        <button class="btn btn-primary w-100">Get Started</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-primary">
                    <div class="card-header bg-primary text-white">Enterprise</div>
                    <div class="card-body">
                        <h1 class="price">$29<span>/mo</span></h1>
                        <p>30 users included<br>15 GB storage<br>Phone support</p>
                        <button class="btn btn-primary w-100">Contact Us</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
